<!DOCTYPE html>

<title>Acris Esports 戦績</title>

<style>
body{
    font-family: sans-serif;
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
    background-color: #f5f5f5;
}

h1{
    text-align: center;
    margin-bottom: 20px;
}

.record{
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
}

table{
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td{
    border: 1px solid #ddd;
    padding: 12px;
    text-align: center;
}

th{
    background: #222;
    color: white;
}

/* 勝敗欄 */
.result{
    background: white;
    width: 80px;
    font-size: 36px;
    font-weight: bold;
    line-height: 1;
}

/* 勝利 ○ */
.win{
    color: white;
    background: white;
    text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000;
}

/* 敗北 ● */
.lose{
    color: black;
    background: white;
}
</style>
</head>
